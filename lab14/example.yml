---
- hosts: all
  become: yes
  become_method: sudo
  tasks:
    - name: install python package
      become: yes
      package:
        name:
          - python3-apt
          - apache2
        state: latest
    - name: copy conf file
      become: yes
      copy:
        src: files/config/apache2.conf
        dest: /etc/apache2/apache2.conf
        owner: root
        group: root
        mode: 0644
    - name: add symbolic link
      file:
        src: /etc/apache2/mods-available/headers.load
        dest: /etc/apache2/mods-enabled/headers.load
        state: link
        force: yes
    - name: restart apache
      service:
        name: apache2
        state: restarted
